<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UzTwit{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            padding: 15px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #3a86ff;
        }

        .nav-links a {
            text-decoration: none;
            margin: 0 15px;
            color: #444;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #3a86ff;
        }

        .auth-btn {
            padding: 8px 18px;
            border-radius: 20px;
            background: #3a86ff;
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background: #265df2;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            flex: 1;
        }

        /* FOOTER */
        footer {
            background: white;
            text-align: center;
            padding: 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            font-size: 14px;
        }

        /* CARD STYLE */
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .btn-primary {
            background: #3a86ff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #265df2;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media(max-width: 900px){
            .grid {
                grid-template-columns: 1fr;
            }
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="navbar">
        <div class="logo">UzTwit</div>

        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'about' %}">About Developer</a>
        </div>

        <div>
            {% if user.is_authenticated %}
                <span style="margin-right:15px;">👋 {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="auth-btn">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="auth-btn">Login / Register</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        Made by Mubinaxon ♡
    </footer>

</body>
</html>

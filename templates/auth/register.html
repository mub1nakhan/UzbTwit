{% extends "base.html" %}
{% block title %}Register | UzTwit{% endblock %}

{% block content %}

<div style="max-width:500px; margin:0 auto;">

    <div class="card">

        <h2 style="text-align:center; margin-bottom:25px;">
            Ro‘yxatdan o‘tish
        </h2>

        {% if messages %}
            {% for message in messages %}
                <div style="
                    background:#ffe6e6;
                    color:#a00;
                    padding:10px;
                    border-radius:10px;
                    margin-bottom:15px;
                    font-size:14px;
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <input type="text" name="first_name" placeholder="Ism" required class="input-style">
                <input type="text" name="last_name" placeholder="Familya" required class="input-style">
            </div>

            <input type="email" name="email" placeholder="Email" required class="input-style">
            <input type="text" name="username" placeholder="Username" required class="input-style">

            <input type="password" name="password1" 
                   placeholder="Parol" 
                   required 
                   minlength="8"
                   pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*#?&]{8,}$"
                   title="Kamida 8 ta belgi, 1 ta harf va 1 ta raqam bo‘lishi kerak"
                   class="input-style">

            <input type="password" name="password2" 
                   placeholder="Parolni tasdiqlang" 
                   required 
                   class="input-style">

            <button type="submit" class="btn-primary" style="width:100%; margin-top:15px;">
                Ro‘yxatdan o‘tish
            </button>

        </form>

        <p style="text-align:center; margin-top:20px; font-size:14px;">
            Hisobingiz bormi?
            <a href="{% url 'login' %}" style="color:#3a86ff; text-decoration:none;">
                Tizimga kirish
            </a>
        </p>

    </div>
</div>


<style>
.input-style{
    width:100%;
    padding:12px 15px;
    margin-bottom:15px;
    border-radius:12px;
    border:1px solid #ddd;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

.input-style:focus{
    border-color:#3a86ff;
    box-shadow:0 0 0 3px rgba(58,134,255,0.1);
}
</style>

{% endblock %}
